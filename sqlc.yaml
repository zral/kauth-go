version: "2"
sql:
  - engine: "sqlite"
    queries: "internal/db/query/"
    schema: "internal/db/migrations/"
    gen:
      go:
        package: "gen"
        out: "internal/db/gen"
        emit_json_tags: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        null_str: "NullString"
