<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – Klarsyn</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0; min-height: 100vh;
            background: url('/static/viking-door.jpg') center/cover no-repeat fixed;
            display: flex; align-items: center; justify-content: center;
        }
        .card {
            background: transparent;
            border-radius: 12px;
            padding: 2.5rem 2rem;
            width: 100%; max-width: 380px;
            margin: 1rem;
        }
        .logo { text-align: center; margin-bottom: 1.5rem; }
        .logo h1 { font-size: 1.5rem; font-weight: 700; color: #f1f5f9; margin: 0; text-shadow: 0 1px 4px rgba(0,0,0,.7); }
        .logo p { font-size: .85rem; color: #cbd5e1; margin: .25rem 0 0; text-shadow: 0 1px 3px rgba(0,0,0,.7); }
        label { display: block; font-size: .85rem; color: #e2e8f0; margin-bottom: .375rem; text-shadow: 0 1px 3px rgba(0,0,0,.7); }
        input[type=email] {
            display: block; width: 100%; padding: .65rem .75rem; margin-bottom: .8rem;
            border: 1px solid rgba(255,255,255,.2); border-radius: 6px; font-size: .95rem;
            background: rgba(15,23,42,.6); color: #e2e8f0;
        }
        input::placeholder { color: #94a3b8; }
        input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.2); }
        button[type=submit] {
            display: block; width: 100%; padding: .7rem; border: 1px solid rgba(255,255,255,.15);
            border-radius: 6px; font-size: .95rem; cursor: pointer; font-weight: 500;
            background: rgba(15,23,42,.75); color: #e2e8f0;
        }
        button[type=submit]:hover { background: rgba(15,23,42,.9); border-color: rgba(255,255,255,.3); }
        .msg { padding: .6rem .75rem; border-radius: 6px; margin-bottom: 1rem; text-align: center; font-size: .9rem; }
        .msg.ok  { color: #166534; background: #f0fdf4; }
        .msg.err { color: #dc2626; background: #fef2f2; }
        .btn-social {
            display: flex; width: 100%; padding: .7rem; border: 1px solid rgba(255,255,255,.15);
            border-radius: 6px; font-size: .95rem; cursor: pointer; font-weight: 500;
            align-items: center; justify-content: center; gap: .5rem;
            text-decoration: none; background: rgba(15,23,42,.75); color: #e2e8f0; margin-bottom: .6rem;
        }
        .btn-social:hover { background: rgba(15,23,42,.9); border-color: rgba(255,255,255,.3); }
        .back { display: block; text-align: center; margin-top: 1rem; color: #cbd5e1; font-size: .9rem; text-decoration: none; text-shadow: 0 1px 3px rgba(0,0,0,.7); }
        .back:hover { color: #f1f5f9; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <h1>Klarsyn Admin</h1>
        <p id="subtitle">Innsikt som skaper forsprang</p>
    </div>
    {{if .Message}}
    <div class="msg {{if .IsError}}err{{else}}ok{{end}}">{{.Message}}</div>
    {{end}}
    {{if not .Sent}}
    <div id="buttons-view">
        <a href="/admin/google-init" class="btn-social">
            <svg width="18" height="18" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.5 30.3 0 24 0 14.7 0 6.7 5.4 2.8 13.3l7.8 6C12.4 13 17.8 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.6 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.2-9.9 6.2-17z"/>
                <path fill="#FBBC05" d="M10.6 28.7A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A24 24 0 0 0 0 24c0 3.9.9 7.5 2.8 10.7l7.8-6z"/>
                <path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.5-5.8c-2.1 1.4-4.8 2.3-8.4 2.3-6.2 0-11.6-4.2-13.4-9.9l-7.8 6C6.7 42.6 14.7 48 24 48z"/>
            </svg>
            Fortsett med Google
        </a>
        <a href="#" class="btn-social" onclick="document.getElementById('buttons-view').style.display='none';document.getElementById('email-view').style.display='block';document.getElementById('subtitle').textContent='Logg inn med e-postlenke';document.getElementById('email-input').focus();return false;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="M22 7l-10 7L2 7"/>
            </svg>
            Logg inn med e-postlenke
        </a>
    </div>
    <div id="email-view" style="display:none;">
        <label for="email-input">E-postadresse</label>
        <form method="POST" action="/admin/login">
            <input type="email" id="email-input" name="email" required autocomplete="email">
            <button type="submit">Send innloggingslenke</button>
        </form>
        <a href="#" class="back" onclick="document.getElementById('email-view').style.display='none';document.getElementById('buttons-view').style.display='block';document.getElementById('subtitle').textContent='Innsikt som skaper forsprang';return false;">Tilbake til innlogging</a>
    </div>
    {{end}}
</div>
</body>
</html>
